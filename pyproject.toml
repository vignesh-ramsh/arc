[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arc"
version = "2.0.0a0"
description = "Arc — a micro-kernel framework where everything is a plugin."
requires-python = ">=3.12"
dependencies = [
    "starlette>=0.37",
    "uvicorn>=0.30",
    "pydantic>=2.7",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "typer>=0.16",
    "click==8.1.8",
    "structlog>=24.1",
    "cryptography>=42.0",
]

[project.optional-dependencies]
dev = [
    "watchfiles>=0.21",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "anyio>=4.0"]

[project.scripts]
arc = "arc.kernel.cli:main"

[tool.setuptools.packages.find]
include = ["arc*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"