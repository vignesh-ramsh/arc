# Uses relay for routing + hook-based data integrity.
# Uses db.session for any direct queries.
#
# This file is used by `arc install` if the plugin is ever published
# to a git remote, and by `arc doctor` for graph metadata.

name        = "hrms"
version     = "1.0.0"
