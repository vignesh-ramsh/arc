# psqldb — PostgreSQL database plugin for Arc
# Provides the db.session and db.engine capabilities.
# No other plugin is required before this one.
#
# Install: arc install https://github.com/arc-plugins/psqldb --branch main

name        = "psqldb"
version     = "1.0.0"
entrypoint  = "plugins.psqldb.plugin:DatabasePlugin"   # → plugins.psqldb.plugin:DatabasePlugin
provides    = ["db.session", "db.engine"]
requires    = []
load_order  = 0
critical    = true

[python]
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "cryptography>=42.0",   # backup encryption
]